<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dj Heroo</title>
    <link rel="stylesheet" href="./styles.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
</head>

<body>

    <div class="container px-xl-5">

        <header class="container mt-3 d-flex flex-column align-items-center justify-content-center">
            <img class="profile rounded-circle" src="./poza.jpg" alt="" />
            <h1 class="mt-3 fs-1">djheroo.com</h1>
            <h2 class="fs-5 mt-2 text-center">Catch me playing every Saturday at Urban Home</h2>
        </header>

        <!-- Main Content Area -->
        <div class="container px-xl-5">



            <!-- MOBILE ONLY: Static Playlists View -->
            <p class="d-block d-md-none outside fs-4 text-center mt-3">Playlists</p>
            <div class="item-pl d-block d-md-none rounded-5 mt-3 mb-3 px-1 mx-auto col-12 col-lg-6">
                <div
                    class="row text-center g-1 py-3 py-lg-2 justify-content-md-between justify-content-evenly px-1 px-md-4">
                    <div onclick="window.open('https://open.spotify.com/user/31cdnqrb67ukkbvxmzczqew4uhxu?si=b38ee0c6f74545e0', '_blank')"
                        class="playlist col-4 col-md-auto d-flex flex-column flex-md-row align-items-center">
                        <img class="icon p-2 rounded-circle" src="./spotify.svg" alt="Spotify" />
                        <p class="mt-1 mt-md-0 ms-md-2 mb-0">Spotify</p>
                    </div>
                    <div onclick="window.open('https://music.apple.com/profile/djheroo', '_blank')"
                        class="playlist col-4 col-md-auto d-flex flex-column flex-md-row align-items-center">
                        <img class="icon p-2 rounded-circle" src="./apple music.svg" alt="Apple Music" />
                        <p class="mt-1 mt-md-0 ms-md-2 mb-0">Apple Music</p>
                    </div>
                    <div onclick="window.open('https://www.youtube.com/@HerooDj/playlists', '_blank')"
                        class="playlist col-4 col-md-auto d-flex flex-column flex-md-row align-items-center">
                        <img class="icon p-2 rounded-circle" src="./youtube.svg" alt="YouTube" />
                        <p class="mt-1 mt-md-0 ms-md-2 mb-0">YouTube</p>
                    </div>
                </div>
            </div>

            <!-- DESKTOP ONLY: Collapsible Playlists Button (Fixed Parent Positioning) -->
            <div class="item d-none d-md-block rounded-5 mt-3 px-3 py-2 mx-auto col-12 col-lg-6"
                data-bs-toggle="collapse" data-bs-target="#playlistsMenu" aria-expanded="false"
                aria-controls="playlistsMenu" style="cursor: pointer;">
                <div class="d-flex align-items-center justify-content-between">
                    <img class="icon icon-down p-2 rounded-circle" src="./down.svg" alt="Expand" />
                    <img class="icon icon-up p-2 rounded-circle" src="./up.svg" alt="Collapse" />
                    <p class="fs-4 mb-0 text-center mx-auto">Playlists</p>
                </div>
            </div>

            <!-- DESKTOP ONLY: Collapse Container -->
            <div class="collapse" id="playlistsMenu">
                <div class="item-pl rounded-5 mt-3 px-1 mx-auto col-12 col-lg-6">
                    <div
                        class="row d-none d-md-flex text-center g-1 py-2 justify-content-xl-between justify-content-evenly px-1 px-lg-4">
                        <div onclick="window.open('https://open.spotify.com/user/31cdnqrb67ukkbvxmzczqew4uhxu?si=b38ee0c6f74545e0', '_blank')"
                            class="playlist col-4 col-xl-auto d-flex flex-column flex-xl-row align-items-center">
                            <img class="icon p-2 rounded-circle" src="./spotify.svg" alt="Spotify" />
                            <p class="mt-1 mt-xl-0 ms-xl-2 mb-0">Spotify</p>
                        </div>
                        <div onclick="window.open('https://music.apple.com/profile/djheroo', '_blank')"
                            class="playlist col-4 col-xl-auto d-flex flex-column flex-xl-row align-items-center">
                            <img class="icon p-2 rounded-circle" src="./apple music.svg" alt="Apple Music" />
                            <p class="mt-1 mt-xl-0 ms-xl-2 mb-0">Apple Music</p>
                        </div>
                        <div onclick="window.open('https://www.youtube.com/@HerooDj/playlists', '_blank')"
                            class="playlist col-4 col-xl-auto d-flex flex-column flex-xl-row align-items-center">
                            <img class="icon p-2 rounded-circle" src="./youtube.svg" alt="YouTube" />
                            <p class="mt-1 mt-xl-0 ms-xl-2 mb-0">YouTube</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Mixes Item -->
            <div class="item rounded-5 mt-3 px-3 py-2 mx-auto col-12 col-lg-6"
                onclick="window.open('https://mixcloud.com/djheroo/', '_blank')">
                <div class="d-flex align-items-center justify-content-between">
                    <img class="icon p-2 rounded-circle" src="./mixcloud.svg" alt="Mixcloud" />
                    <p class="fs-4 mb-0 text-center mx-auto">Mixes</p>
                </div>
            </div>

            <!-- Instagram Item -->
            <div class="item rounded-5 mt-3 px-3 py-2 mx-auto col-12 col-lg-6"
                onclick="window.open('https://instagram.com/djheroo/', '_blank')">
                <div class="d-flex align-items-center justify-content-between">
                    <img class="icon p-2 rounded-circle" src="./instagram.svg" alt="Instagram" />
                    <p class="fs-4 mb-0 text-center mx-auto">Instagram</p>
                </div>
            </div>

            <!-- Facebook Item -->
            <div class="item rounded-5 mt-3 mb-4 px-3 py-2 mx-auto col-12 col-lg-6"
                onclick="window.open('https://www.facebook.com/DjHerooOfficial/', '_blank')">
                <div class="d-flex align-items-center justify-content-between">
                    <img class="icon p-2 rounded-circle" src="./facebook.svg" alt="Facebook" />
                    <p class="fs-4 mb-0 text-center mx-auto">Facebook</p>
                </div>
            </div>



        </div>

    </div>

    <script type="text/javascript">
        var sc_project = 13195714;
        var sc_invisible = 1;
        var sc_security = "284685ff"; 
    </script>

    <noscript>
        <div class="statcounter"><a title="Web Analytics" href="https://statcounter.com/" target="_blank"><img
                    class="statcounter" src="https://c.statcounter.com/13195714/0/284685ff/1/" alt="Web Analytics"

    </noscript>

    <!-- Bootstrap & FontAwesome Bundle Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/6f467f4012.js" crossorigin="anonymous"></script>

</body>

</html>

    <meta charset="UTF-8" />

<body>

    <div class="container px-xl-5 mb-5 mt-3">

        <header class="container d-flex flex-column align-items-center justify-content-center">
            <img class="profile rounded-circle animate__animated animate__bounceInDown" src="./poza.jpg" alt="" />
            <h1 class="mt-3 fs-1 animate__animated animate__bounceInUp">djheroo.com</h1>
            <h2 class="fs-5 mt-1 mb-4 text-center animate__animated animate__bounceInDown">Resident DJ at Urban Home
                Pitesti</h2>
        </header>

        <!-- Main Content Area -->
        <div class="container px-xl-5">

            <div id="liveNow"
                class="item rounded-5 mt-3 px-3 py-2 mx-auto col-12 col-lg-6 animate__animated animate__bounceInLeft"
                onclick="window.open('https://www.mixcloud.com/djheroo/', '_blank')">
                <div class="d-flex align-items-center">
                    <div class="icon-wrapper-normal rounded-circle d-flex align-items-center justify-content-center">
                        <img class="icon" src="./live.svg" alt="Instagram" />
                    </div>
                    <p
                        class="fs-4 mb-0 text-center mx-auto animate__animated animate__tada animate__repeat animate__infinite">
                        Live Now</p>
                </div>
            </div>

            <!-- Mixes Item -->
            <div class="item rounded-5 mt-3 px-3 mx-auto col-12 col-lg-6 animate__animated animate__bounceInRight"
                onclick="window.open('https://mixcloud.com/djheroo/', '_blank')">
                <div class="d-flex align-items-center">
                    <div class="icon-wrapper p-2 rounded-circle d-flex align-items-center justify-content-center">
                        <img class="icon" src="./mixcloud.svg" alt="Mixcloud" />
                    </div>
                    <div class="mx-auto text-center">
                        <p class="fs-4 mb-0 mt-2 text-center mx-auto">Mixes</p>
                        <p class="secondary fs-6 mb-2 mt-0">Live every Saturday from 23:00</p>
                    </div>
                </div>
            </div>

            <!-- Instagram Item -->
            <div class="item rounded-5 mt-3 px-3 py-2 mx-auto col-12 col-lg-6 animate__animated animate__bounceInLeft"
                onclick="window.open('https://instagram.com/djheroo/', '_blank')">
                <div class="d-flex align-items-center">
                    <div class="icon-wrapper p-2 rounded-circle d-flex align-items-center justify-content-center">
                        <img class="icon" src="./instagram.svg" alt="Instagram" />
                    </div>
                    <p class="fs-4 mb-0 text-center mx-auto">Instagram</p>
                </div>
            </div>

            <!-- Facebook Item -->
            <div class="item rounded-5 mt-3 px-3 py-2 mx-auto col-12 col-lg-6 animate__animated animate__bounceInRight"
                onclick="window.open('https://www.facebook.com/DjHerooOfficial/', '_blank')">
                <div class="d-flex align-items-center">
                    <div class="icon-wrapper p-2 rounded-circle d-flex align-items-center justify-content-center">
                        <img class="icon" src="./facebook.svg" alt="Facebook" />
                    </div>
                    <p class="fs-4 mb-0 text-center mx-auto">Facebook</p>
                </div>
            </div>

            <!-- DESKTOP ONLY: Collapsible Playlists Button -->
            <div class="item rounded-5 mt-3 px-3 py-2 mx-auto col-12 col-lg-6 animate__animated animate__bounceInLeft"
                data-bs-toggle="collapse" data-bs-target="#playlistsMenu" aria-expanded="false"
                aria-controls="playlistsMenu" style="cursor: pointer;">
                <div class="d-flex align-items-center justify-content-between">
                    <div class="icon-wrapper p-2 rounded-circle d-flex align-items-center justify-content-center">
                        <!-- Keep only the down arrow -->
                        <img class="icon arrow-toggle" src="./down.svg" alt="Expand/Collapse" />
                    </div>
                    <p class="fs-4 mb-0 text-center mx-auto">Playlists</p>
                </div>
            </div>

            <!-- DESKTOP ONLY: Collapsible Menu -->
            <div class="collapse" id="playlistsMenu">
                <div class="item-pl rounded-5 mt-3 mb-5 px-1 px-md-4 px-lg-1 mx-auto col-12 col-lg-6">
                    <div
                        class="row text-center g-1 py-3 py-lg-2 justify-content-md-between justify-content-evenly px-1 px-md-4">
                        <div onclick="window.open('https://open.spotify.com/user/31cdnqrb67ukkbvxmzczqew4uhxu?si=b38ee0c6f74545e0', '_blank')"
                            class="playlist col-4 col-md-auto d-flex flex-column flex-md-row align-items-center">
                            <div
                                class="icon-wrapper p-2 rounded-circle d-flex align-items-center justify-content-center">
                                <img class="icon" src="./spotify.svg" alt="Spotify" />
                            </div>
                            <p class="mt-1 mt-md-0 ms-md-2 mb-0">Spotify</p>
                        </div>
                        <div onclick="window.open('https://music.apple.com/profile/djheroo', '_blank')"
                            class="playlist col-4 col-md-auto d-flex flex-column flex-md-row align-items-center">
                            <div
                                class="icon-wrapper p-2 rounded-circle d-flex align-items-center justify-content-center">
                                <img class="icon" src="./apple music.svg" alt="Apple Music" />
                            </div>
                            <p class="mt-1 mt-md-0 ms-md-2 mb-0">Apple Music</p>
                        </div>
                        <div onclick="window.open('https://www.youtube.com/@HerooDj/playlists', '_blank')"
                            class="playlist col-4 col-md-auto d-flex flex-column flex-md-row align-items-center">
                            <div
                                class="icon-wrapper p-2 rounded-circle d-flex align-items-center justify-content-center">
                                <img class="icon" src="./youtube.svg" alt="Youtube" />
                            </div>
                            <p class="mt-1 mt-md-0 ms-md-2 mb-0">YouTube</p>
                        </div>
                    </div>
                </div>
            </div>
